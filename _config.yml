# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: shuguang's blog
subtitle: '环境决定基础，选择决定价值，努力决定方向。'
description: '个人博客, 基于价值反馈的选择' # 主要用于SEO
keywords: 书籍交流,网络技术,测试,个人博客,Git,Python
author: shuguang2000
language: zh-Hans
timezone: 'Asia/Shanghai'

# URL
## Set your site url here. For example, if you use GitHub Page, set url as 'https://username.github.io/project'
url: https://shuguang2000.xyz
root: /
permalink: :category/:name/
permalink_defaults:
  lang:zh-CN
pretty_urls:
  trailing_index: false # Set to false to remove trailing 'index.html' from permalinks
  trailing_html: false # Set to false to remove trailing '.html' from permalinks

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render: "404.html"

# skip_render: "mypage/**/*"
# 将会直接将 `source/mypage/index.html` 和 `source/mypage/code.js` 不做改动地输出到 'public' 目录
# 你也可以用这种方法来跳过对指定文章文件的渲染
# skip_render: "_posts/test-post.md"
# 这将会忽略对 'test-post.md' 的渲染

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
comments: true
auto_spacing: false
titlecase: false # Transform title into titlecase
external_link:
  enable: true # Open external links in new tab
  field: site # Apply to the whole site
  exclude: ''
filename_case: 0 # 文件名是否小写敏感
render_drafts: false # 是否渲染草稿

## 使用Markdown 嵌入图像
post_asset_folder: false
# post_asset_folder: true
# marked:
#   prependRoot: true
#   postAsset: true

relative_link: false # 是否把站内资源的链接改为站内相对链接。建议关闭。
future: true # 文档中指定为未来时间创建
highlight: # 代码块的设置, 请参考 Highlight.js 进行设置: https://hexo.io/docs/syntax-highlight#Highlight-js
  enable: true # 是否开启代码高亮功能
  line_number: true # 代码块中是否在前面加上行号
  auto_detect: false # 是否自动检测代码块的语言（比如xml、JavaScript、mermaid等）
  tab_replace: '' # 用什么字符来代替tab(`\t`)字符。
  wrap: true
  hljs: false
prismjs: # 代码块的设置, 请参考 PrismJS 进行设置: https://hexo.io/docs/syntax-highlight#PrismJS
  enable: false
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator:
  path: ''
  per_page: 10 # 主页的索引页包含文章数量，如未定义，则采用根目录下的`per_page`值
  order_by: -date # 文章（Post类型）排序属性，`-`为降序

# Category & Tag
## 分类具有顺序性和层次性，也就是说 Foo, Bar 不等于 Bar, Foo；而标签没有顺序和层次。
##  Hexo 不支持指定多个同级分类（Hexo默认是按顺序的父子类）。
## 为文章添加多个分类，可以尝试以下 list 中的方法。

## categories:
## - [Diary, PlayStation]
## - [Diary, Games]
## - [Life]

## 此时这篇文章同时包括三个分类： PlayStation 和 Games 分别都是父分类 Diary 的子分类，同时 Life 是一个没有子分类的分类。

default_category: uncategorized
category_map:
tag_map:

# Metadata elements
## https://developer.mozilla.org/en-US/docs/Web/HTML/Element/meta
meta_generator: true

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss
## updated_option supports 'mtime', 'date', 'empty'
updated_option: 'mtime' # 使用文件的最后修改时间

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
## include:/exclude: options only apply to the 'source/' folder
## 可以使用 glob 表达式 对目录和文件进行匹配。
## include 和 exclude 选项只会应用到 source/ ，而 ignore 选项会应用到所有文件夹.
include:
exclude:
ignore:

# 通过设置 include/exclude 可以让 Hexo 进行处理或忽略某些目录和文件夹。
# Hexo 默认会不包括 source/ 下的文件和文件夹(Hexo 的 _posts 和 _data 等目录除外)
# 处理或不处理目录或文件
# include:
  # - ".nojekyll"
  # 处理 'source/css/_typing.css'
  # - "css/_typing.css"
  # 处理 'source/_css/' 中的任何文件，但不包括子目录及其其中的文件。
  # - "_css/*"
  # 处理 'source/_css/' 中的任何文件和子目录下的任何文件
  # - "_css/**/*"

# exclude:
  # 不处理 'source/js/test.js'
  # - "js/test.js"
  # 不处理 'source/js/' 中的文件、但包括子目录下的所有目录和文件
  # - "js/*"
  # 不处理 'source/js/' 中的文件和子目录下的任何文件
  # - "js/**/*"
  # 不处理 'source/js/' 目录下的所有文件名以 'test' 开头的文件，但包括其它文件和子目录下的单文件
  # - "js/test*"
  # 不处理 'source/js/' 及其子目录中任何以 'test' 开头的文件
  # - "js/**/test*"
  # 不要用 exclude 来忽略 'source/_posts/' 中的文件。你应该使用 'skip_render'，或者在要忽略的文件的文件名之前加一个下划线 '_'
  # 在这里配置一个 - "_posts/hello-world.md" 是没有用的。

# ignore:
  # 忽略任何一个名叫 'foo' 的文件夹
  # - "**/foo"
  # 只忽略 'themes/' 下的 'foo' 文件夹
  # - "**/themes/*/foo"
  # 对 'themes/' 目录下的每个文件夹中忽略名叫 'foo' 的子文件夹
  # - "**/themes/**/foo"

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
## Hexo 配置文件中的 theme_config 的优先级最高，其次是 _config.[theme].yml 文件，最后是位于主题目录下的 _config.yml 文件。
theme: next
theme_config: 

# Deployment
## Docs: https://hexo.io/docs/one-command-deployment
## YAML依靠缩进来确定元素间的从属关系。因此，请确保每个deployer的缩进长度相同，并且使用空格缩进。
deploy:
- type: git
  repository: git@github.com:shuguang2000/shuguang2000.github.io.git
  branch: main
- type: baidu_url_submitter

# 同时多个deployer也可以这么写
# 第一种
# - type: git
#   repository: git@github.com:shuguang2000/pages.git
#   branch: main
# 第二种
#   repository:
#     github: <repository url>,[branch]
#     gitcafe: <repository url>,[branch]
  message: Site updated:{{ now('YYYY-MM-DD HH:mm:ss') }}
## 使用令牌 / hexo-deployer-git 不存储您的用户名和密码。使用git-credential-cache临时存储它们
## token: 

# Local Search
# Dependencies: https://github.com/theme-next/hexo-generator-search
search:
  path: search.xml
  field: post
  format: html
  limit: 10000

# Post wordcount display settings
# Dependencies: https://github.com/theme-next/hexo-symbols-count-time
# 设置博客单词统计
symbols_count_time:
  # 文章字数统计
  symbols: true
  # 文章阅读时间统计
  time: true
  # 站点总字数统计
  total_symbols: true
  # 站点总阅读时间统计
  total_time: true
  exclude_codeblock: true

# sitemap
# Dependencies: https://github.com/hexojs/hexo-generator-sitemap
sitemap:
  path: 
    - sitemap.xml
    - sitemap.txt
  template: ./source/sitemap_template.xml
  template_txt: ./source/sitemap_template.txt
  rel: false
  tags: true
  categories: true

# baidusitemap
baidusitemap:
  path: baidusitemap.xml

# hexo-baidu-url-submit
# 主动推送给百度
baidu_url_submit:
  count: 1000 # 提交最新的一个链接
  host: shuguang2000.xyz # 在百度站长平台中注册的域名
  token: txwqSYbxmVlGkE9J # 请注意这是您的秘钥，所以请不要把博客源代码发布在公众仓库里!
  path: baidu_urls.txt # 文本文档的地址，新链接会保存在此文本文档里

# RSS
# Dependencies: https://github.com/hexojs/hexo-generator-feed
feed:
  enable: true
  type: atom
  path: atom.xml
  limit: 20
  hub:
  content:
  content_limit: 140
  content_limit_delim: ' '
  order_by: -date
  icon: icon.png
  autodiscovery: true
  template: ./source/rss_template.xml

# 脚注插件
# Dependencies: https://github.com/kchen0x/hexo-reference
plugins:
  - hexo-reference

# 图片懒加载
# hexo-lazyload-image: https://github.com/Troy-Yang/hexo-lazyload-image
lazyload:
  enable: true
  onlypost: true # optional
  loadingImg: # optional eg ./images/loading.gif
  isSPA: false # optional
  preloadRatio: 3 # optional, default is 1
    
# hexo-neat
# Dependencies: https://github.com/rozbo/hexo-neat
# 博文压缩
neat_enable: true
# 压缩html
neat_html:
 enable: true
 exclude:
# 压缩css
neat_css:
 enable: true
 exclude:
   - '*/*.min.css'
# 压缩js
neat_js:
 enable: true
 mangle: true
 output:
 compress:
 exclude:
   - '**/*.min.js'
   - '**/jquery.fancybox.pack.js'
   - '**/index.js'

# 外链自动添加nofollow
# Dependencies: https://github.com/hexojs/hexo-filter-nofollow
nofollow:
  enable: true
  field: post # 'post' - 仅将 nofollow 属性添加到您的帖子内容中的外部链接;'site' - 将 nofollow 属性添加到整个站点的外部链接
  exclude: # 排除主机名。在适用时指定子域。
    - 'https://github.com/shuguang2000'
    - 'https://shuguang2000.github.io'

# Markdown-it config
## Docs: https://github.com/celsomiranda/hexo-renderer-markdown-it/wiki
markdown:
  preset: 'default'
  render:
    html: true #  HTML 内容是否应转义或传递给最终结果
    xhtmlOut: false # 导出完全兼容 XHTML 的标签
    langPrefix: 'language-' # 为代码块的类名添加前缀（指定语言时）
    breaks: true # 换行符将被解析为<br>标签
    linkify: true # 内联直接粘贴到文本中的链接
    typographer: true # 可以替换常见的排版元素，如 ©、大引号、破折号等
    quotes: '“”‘’'
  anchors:
    level: 2 # 创建 ID 的最低级别。 （例如 h2 至 h6）
    collisionSuffix: 'v' # 如果 ID 重复，则添加到给定数字前面的后缀。
    permalink: true # 是否创建在标题前创建锚链接
    permalinkClass: header-anchor # 用于永久链接锚标记的类。
    permalinkSide: 'left' # 设置为“右”以在标题后添加固定链接
    permalinkSymbol: '#' # 默认值'¶' 用于制作永久链接的符号
    case: 0 # 将锚转换为 (1) 小写； (2) 大写
    separator: '-' # 用字符替换空格
  plugins:
    # 默认包含的插件
    - markdown-it-abbr # 注释 *[HTML]: 超文本标记语言
    - markdown-it-attrs
    - markdown-it-cjk-breaks
    - markdown-it-container # 自定义容器
    - markdown-it-deflist # 支持自定义列表
    - markdown-it-emoji # 表情 :cat:→🐱
    # - markdown-it-footnote # 脚注 参考文献[^1] [^1]:
    - markdown-it-ins # 下划线 ++Inserted++ ,删除线 ~~Del~~ 
    - markdown-it-mark # 突出显示 ==marked==
    - markdown-it-sub # 下标插件 H~2~O→H2O
    - markdown-it-sup # 上标插件 X^2^→X2
    # 扩展需安装的插件
    - markdown-it-checkbox # 复选框 未选：- [ ] 选中：- [x]
    - markdown-it-imsize # 自定义图片宽高 ![test](image.png =100x200)
    # - markdown-it-expandable # 折叠/展开内容 +++ **点击折叠**这是被隐藏的内容 +++